<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王士性行程地图 (1547-1583)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f2e9;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            max-width: 300px;
        }
        .location-label {
            position: absolute;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid #ddd;
        }
        .event-marker {
            background-color: #3388ff;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid white;
        }
        .birth-marker {
            background-color: #ff3333;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid white;
        }
        .legend {
            line-height: 18px;
            color: #555;
            font-size: 12px;
        }
        h1 {
            margin-top: 0;
            font-size: 16px;
            color: #333;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/core-js/3.32.1/minified.js"></script>

    <style class="mobile-patch">
        /* 移动端适配补丁 */
        @media (max-width: 768px) {
            .leaflet-control-container .leaflet-top { top: 10px; }
            .leaflet-control-container .leaflet-bottom { bottom: 10px; }
            .info-panel, .legend, .time-control {
                max-width: 95% !important;
                font-size: 12px;
                left: 2.5% !important;
                right: 2.5% !important;
            }
            .info-panel {
                max-height: 30vh;
                bottom: 0;
                top: auto;
                border-radius: 10px 10px 0 0;
            }
            h1 { font-size: 1.2rem !important; }
            #map { height: 60vh !important; }
        }
    </style>

</head>
<body>
    <div id="map"></div>
    <div class="info-panel">
        <h1>王士性行程地图 (1547-1583)</h1>
        <div class="legend">
            <div><i style="background: #ff3333; width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:5px;"></i> 出生地</div>
            <div><i style="background: #3388ff; width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;"></i> 事件地点</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图，中心点设为中原地区
        var map = L.map('map').setView([34.0, 113.0], 5);

        // 使用标准明代中国地图作为底图（示例使用普通地图，实际可替换为真实明代地图）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            minZoom: 4,
            maxZoom: 8
        }).addTo(map);

        // 地点数据
        var locations = [
            {
                name: "临海县",
                event: "1547年出生",
                lat: 28.8567,
                lng: 121.1389,
                year: 1547,
                type: "birth"
            },
            {
                name: "杭州府",
                event: "1569年游学\n1578年作《游武林湖山六记》",
                lat: 30.2741,
                lng: 120.1551,
                year: 1569,
                type: "event"
            },
            {
                name: "应天府(南京)",
                event: "1571年游历\n1574年再访",
                lat: 32.0603,
                lng: 118.7969,
                year: 1571,
                type: "event"
            },
            {
                name: "金华府",
                event: "1574年游历",
                lat: 29.0781,
                lng: 119.6474,
                year: 1574,
                type: "event"
            },
            {
                name: "缙云县",
                event: "1576年游历",
                lat: 28.6593,
                lng: 120.0919,
                year: 1576,
                type: "event"
            },
            {
                name: "处州府(丽水)",
                event: "1576年游历",
                lat: 28.4676,
                lng: 119.9227,
                year: 1576,
                type: "event"
            },
            {
                name: "青田县",
                event: "1576年游历",
                lat: 28.1399,
                lng: 120.2826,
                year: 1576,
                type: "event"
            },
            {
                name: "京师(北京)",
                event: "1578年进京\n1583年任礼科给事中",
                lat: 39.9042,
                lng: 116.4074,
                year: 1578,
                type: "event"
            },
            {
                name: "确山县",
                event: "1578年途经\n1579年著《横山烈妇祠记》",
                lat: 32.8016,
                lng: 114.0265,
                year: 1578,
                type: "event"
            },
            {
                name: "登封县(嵩山)",
                event: "1581年著《嵩山记》《游梁记》",
                lat: 34.4840,
                lng: 113.0366,
                year: 1581,
                type: "event"
            }
        ];

        // 添加标记点和标签
        locations.forEach(function(loc) {
            var marker;
            if (loc.type === "birth") {
                marker = L.circleMarker([loc.lat, loc.lng], {
                    className: 'birth-marker',
                    radius: 8
                });
            } else {
                marker = L.circleMarker([loc.lat, loc.lng], {
                    className: 'event-marker',
                    radius: 6
                });
            }
            
            marker.addTo(map);
            
            // 创建并添加文本标签
            var label = L.divIcon({
                className: 'location-label',
                html: `<strong>${loc.name}</strong><br>${loc.year}年<br>${loc.event.split('\n')[0]}`,
                iconSize: [100, 40]
            });
            
            L.marker([loc.lat, loc.lng], {
                icon: label,
                zIndexOffset: 1000
            }).addTo(map);
            
            // 添加完整信息的弹窗
            marker.bindPopup(`<b>${loc.name}</b><br><small>${loc.event.replace(/\n/g, '<br>')}</small>`);
        });
    </script>
</body>
</html>
